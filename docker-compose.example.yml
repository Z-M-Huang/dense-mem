# Dense-Mem docker compose TEMPLATE.
#
# Copy this file to docker-compose.yml (gitignored) and adjust as needed.
# A matching .env file must live beside it — use .env.example as a starting
# point and set at minimum POSTGRES_PASSWORD, NEO4J_PASSWORD, and
# CONTROL_PORTAL_TOKEN.
#
# Required env in .env:
#   POSTGRES_PASSWORD         Postgres password for the postgres container
#   NEO4J_PASSWORD            Neo4j password (user defaults to "neo4j")
#   CONTROL_PORTAL_TOKEN      Token for the local profile/API-key portal
#   POSTGRES_HOST, _USER, _DB, _PORT, _SSLMODE  (for the entrypoint to
#                             assemble POSTGRES_DSN — see docker-entrypoint.sh)
#
# Optional env (sensible defaults — see .env for the full list):
#   NEO4J_USER, NEO4J_DATABASE
#   REDIS_PASSWORD, REDIS_DB, REDIS_PORT
#
# The image entrypoint (/app/docker-entrypoint.sh) builds POSTGRES_DSN from
# its component env vars at container start, so no credentialed connection
# string literal appears in this file, in .env, or anywhere else on disk.
#
# Postgres migrations run during server startup after postgres is healthy and
# before schema-dependent checks run.

services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"${POSTGRES_USER:-densemem}\" -d \"${POSTGRES_DB:-densemem}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  neo4j:
    # Default local/dev setup: Neo4j Community with the Graph Data Science plugin.
    # Enterprise + GDS is supported by dense-mem, but is not bundled here.
    image: neo4j:5.26-community
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set in .env}
      NEO4J_PLUGINS: '["graph-data-science"]'
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1g
      NEO4J_server_memory_pagecache_size: 512m
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
      - neo4j-plugins:/plugins
    ports:
      - "127.0.0.1:${NEO4J_HTTP_PORT:-7474}:7474"
      - "127.0.0.1:${NEO4J_BOLT_PORT:-7687}:7687"
    healthcheck:
      test:
        - "CMD-SHELL"
        - >
          wget -q --spider http://127.0.0.1:7474
          && cypher-shell -u "${NEO4J_USER:-neo4j}" -p "${NEO4J_PASSWORD}" 'RETURN 1' >/dev/null 2>&1
          || exit 1
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 60s
    restart: unless-stopped

  redis:
    # Redis is optional for single-node and required for multi-instance.
    profiles: ["redis"]
    image: redis:7-alpine
    env_file:
      - .env
    command: >
      redis-server
      --appendonly yes
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ${REDIS_PASSWORD:+-a $$REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  server:
    image: ghcr.io/markhuangai/dense-mem:latest
    env_file:
      - .env
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:8090:8090"
    environment:
      POSTGRES_HOST: postgres
      NEO4J_URI: bolt://neo4j:7687
      REDIS_ADDR: "${REDIS_ADDR:-}"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  neo4j-data:
  neo4j-logs:
  neo4j-plugins:
  redis-data:
